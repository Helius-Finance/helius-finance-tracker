<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Helius logo mark</title>
  <desc id="desc">A refined H monogram inside a solar ring, using the orange palette established by Helius.</desc>
  <defs>
    <linearGradient id="ring" x1="110" y1="96" x2="404" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF7A00"/>
      <stop offset="1" stop-color="#FFB000"/>
    </linearGradient>
    <linearGradient id="core" x1="158" y1="142" x2="354" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD46B"/>
      <stop offset="1" stop-color="#FF9B18"/>
    </linearGradient>
  </defs>

  <circle
    cx="256"
    cy="256"
    r="184"
    stroke="url(#ring)"
    stroke-width="24"
    stroke-linecap="round"
    stroke-dasharray="1042 126"
    transform="rotate(-46 256 256)"
  />
  <circle cx="390" cy="136" r="16" fill="#FFD46B"/>
  <circle cx="390" cy="136" r="7" fill="#FF7A00"/>

  <rect x="150" y="142" width="58" height="228" rx="18" fill="url(#core)"/>
  <rect x="304" y="142" width="58" height="228" rx="18" fill="url(#core)"/>
  <rect x="196" y="236" width="120" height="40" rx="16" fill="#FF9B18"/>
  <rect x="196" y="236" width="120" height="40" rx="16" fill="#FFF4DA" fill-opacity="0.12"/>
</svg>
